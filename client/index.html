<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>School Attendance System</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="text-center mb-4 text-primary">School Attendance System</h1>

    <!-- Date and Buttons -->
    <div class="card shadow-sm mb-4">
      <div class="card-body d-flex flex-wrap align-items-center gap-3">
        <label for="dateInput" class="form-label mb-0">Select a Date:</label>
        <input type="date" id="dateInput" class="form-control w-auto" />
        <button id="searchBtn" class="btn btn-primary">Search</button>
        <button id="reportBtn" class="btn btn-success">Fetch Attendance Report</button>
      </div>
    </div>

    <!-- Attendance Area -->
    <div id="attendanceArea" class="card shadow-sm p-4 bg-white"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
