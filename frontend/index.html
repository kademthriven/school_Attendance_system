<!DOCTYPE html>
<html>

<head>

<title>Student Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container mt-4">

<div class="top-bar">

<label>Select a Date:</label>

<input type="date" id="attendanceDate">

<button class="btn btn-primary" onclick="searchAttendance()">Search</button>

<button class="btn btn-success" onclick="fetchReport()">Fetch Attendance Report</button>

</div>

<hr>

<div id="studentList"></div>

<button class="btn btn-warning mt-3" onclick="markAttendance()">Mark Attendance</button>

<hr>

<h4>Attendance Report</h4>

<table class="table table-bordered">

<thead>

<tr>
<th>Student</th>
<th>Status</th>
<th>Date</th>
</tr>

</thead>

<tbody id="reportTable"></tbody>

</table>

<h3 class="mt-5">Attendance Percentage Dashboard</h3>

<button class="btn btn-info mb-3" onclick="loadPercentage()">Load Percentage</button>

<table class="table table-bordered">

<thead class="table-dark">

<tr>
<th>Student</th>
<th>Total Classes</th>
<th>Present Days</th>
<th>Attendance %</th>
</tr>

</thead>

<tbody id="percentageTable"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
